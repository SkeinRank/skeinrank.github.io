name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Run Astro diagnostics
        run: npm run check

      - name: Build static site
        run: npm run build

      - name: Verify Pages artifact contents
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          if find dist -type l -print -quit | grep -q .; then
            echo "GitHub Pages artifacts must not contain symlinks."
            find dist -type l -print
            exit 1
          fi
          du -sh dist
          find dist -maxdepth 2 -type f | sort | sed -n '1,80p'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
